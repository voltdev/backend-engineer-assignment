server:
  port: 8080

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:h2:mem:productdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration    # <-- required for Boot 4 consistency

logging:
  level:
    root: INFO
    org.springdoc: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG